name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

  lighthouse:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: |
          lhci autorun \
            --collect.url=https://kinect-cms.vercel.app \
            --collect.numberOfRuns=1 \
            --upload.target=temporary-public-storage
        id: lighthouse

      - name: Post scores to dashboard
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const resultsDir = '.lighthouseci';
          const files = fs.readdirSync(resultsDir)
            .filter(f => f.endsWith('.json') && !f.includes('manifest'));

          const results = JSON.parse(
            fs.readFileSync(path.join(resultsDir, files[0]), 'utf8')
          );

          const categories = results.categories;
          const audits = results.audits;

          const payload = {
            run_id: parseInt('${{ github.run_id }}'),
            run_number: parseInt('${{ github.run_number }}'),
            performance_score: Math.round(categories.performance.score * 100),
            lcp: audits['largest-contentful-paint'].numericValue / 1000,
            fid: audits['max-potential-fid'].numericValue,
            cls: audits['cumulative-layout-shift'].numericValue,
          };

          const response = require('https').request(
            '${{ secrets.DASHBOARD_API_URL }}/api/lighthouse',
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
            },
            (res) => {
              let data = '';
              res.on('data', chunk => data += chunk);
              res.on('end', () => console.log('Response:', data));
            }
          );

          response.write(JSON.stringify(payload));
          response.end();
          "
